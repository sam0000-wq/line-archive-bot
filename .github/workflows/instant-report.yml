name: Instant Report
on:
  workflow_dispatch:
jobs:
  send-instant-report:
    runs-on: ubuntu-latest
    steps:
      - name: Download xlsx from GitHub private repo
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          DATE=$(date +%Y%m%d)
          FILE="line_archive_$DATE.xlsx"
          gh api repos/sam0000-wq/line-archive-data/contents/$FILE --jq '.content' | base64 -d > $FILE || echo "FILE_NOT_FOUND=1" >> $GITHUB_ENV
      - name: Send email with attachment
        if: env.FILE_NOT_FOUND != '1'
        env:
          SMTP_HOST: smtp.gmail.com
          SMTP_PORT: 587
          SMTP_USER: ${{ secrets.GMAIL_USER }}
          SMTP_PASS: ${{ secrets.GMAIL_APP_PASSWORD }}
          TO_EMAIL: ${{ secrets.REPORT_TO_EMAIL }}
        run: |
          python3 -c "
import smtplib, ssl, os, glob
from email.mime.multipart import MIMEMultipart
from email.mime.text import MIMEText
from email.mime.base import MIMEBase
from email import encoders
date = os.popen('date +%Y%m%d').read().strip()
files = glob.glob('line_archive_' + date + '.xlsx')
msg = MIMEMultipart()
msg['From'] = os.environ['SMTP_USER']
msg['To'] = os.environ['TO_EMAIL']
msg['Subject'] = 'Instant Report - ' + date
body = 'Critical/Warning threshold reached. Archive attached.'
if files:
  body += chr(10) + 'Attachment: ' + files[0]
else:
  body += chr(10) + 'No messages recorded.'
msg.attach(MIMEText(body, 'plain', 'utf-8'))
for f in files:
  with open(f, 'rb') as fh:
    part = MIMEBase('application', 'octet-stream')
    part.set_payload(fh.read())
  encoders.encode_base64(part)
  part.add_header('Content-Disposition', 'attachment; filename=\"' + os.path.basename(f) + '\"')
  msg.attach(part)
context = ssl.create_default_context()
with smtplib.SMTP(os.environ['SMTP_HOST'], int(os.environ['SMTP_PORT']), timeout=15) as server:
  server.ehlo()
  server.starttls(context=context)
  server.ehlo()
  server.login(os.environ['SMTP_USER'], os.environ['SMTP_PASS'])
  server.send_message(msg)
print('Instant email sent OK')
"
      - name: Send LINE notification
        env:
          LINE_CHANNEL_ACCESS_TOKEN: ${{ secrets.LINE_CHANNEL_ACCESS_TOKEN }}
          TARGET_GROUP_ID: ${{ secrets.TARGET_GROUP_ID }}
        run: |
          DATE=$(date +%Y%m%d)
          curl -sS -X POST "https://api.line.me/v2/bot/message/push" \
            -H "Authorization: Bearer $LINE_CHANNEL_ACCESS_TOKEN" \
            -H "Content-Type: application/json" \
            -d "{\"to\":\"$TARGET_GROUP_ID\",\"messages\":[{\"type\":\"text\",\"text\":\"Instant report email sent for $DATE. Download: https://line-archive-bot.onrender.com/files/line_archive_$DATE.xlsx\"}]}"
