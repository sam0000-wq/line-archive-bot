name: Instant Report
on:
  workflow_dispatch:
jobs:
  send-instant-report:
    runs-on: ubuntu-latest
    steps:
      - name: Download xlsx
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          DATE=$(date +%Y%m%d)
          FILE="line_archive_$DATE.xlsx"
          gh api repos/sam0000-wq/line-archive-data/contents/$FILE --jq .content | base64 -d > $FILE || echo "NOT_FOUND=1" >> $GITHUB_ENV
      - name: Send email
        if: env.NOT_FOUND != '1'
        uses: dawidd6/action-send-mail@v3
        with:
          server_address: smtp.gmail.com
          server_port: 587
          username: ${{ secrets.GMAIL_USER }}
          password: ${{ secrets.GMAIL_APP_PASSWORD }}
          subject: "Instant Report - ${{ github.run_id }}"
          to: ${{ secrets.REPORT_TO_EMAIL }}
          from: ${{ secrets.GMAIL_USER }}
          body: "Critical/Warning threshold reached. Archive attached."
          attachments: line_archive_${{ github.run_attempt }}.xlsx
      - name: LINE notify
        env:
          TOKEN: ${{ secrets.LINE_CHANNEL_ACCESS_TOKEN }}
          GID: ${{ secrets.TARGET_GROUP_ID }}
        run: |
          DATE=$(date +%Y%m%d)
          curl -sS -X POST https://api.line.me/v2/bot/message/push -H "Authorization: Bearer $TOKEN" -H "Content-Type: application/json" -d "{\"to\":\"$GID\",\"messages\":[{\"type\":\"text\",\"text\":\"Instant report sent for $DATE\"}]}"
